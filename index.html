<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASS | Weather Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { font-family: 'Chakra+Petch', sans-serif; background-color: #0f172a; color: #cbd5e1; }
        .card-glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(10px); }
        .dropdown-content { display: none; position: absolute; background-color: #1e293b; min-width: 200px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 12px; border: 1px solid #334155; margin-top: 8px; right: 0; }
        .dropdown:hover .dropdown-content { display: block; }
        .stat-card { border-radius: 24px; padding: 1.5rem; transition: all 0.3s ease; border: 2px solid transparent; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .active-btn { background-color: #2563eb !important; color: white !important; }
        .active-card { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-3">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30">
                <i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase">CASS <span class="text-blue-400 font-light">DASHBOARD</span></h1>
        </div>
        <div class="dropdown relative">
            <button id="dropBtn" class="bg-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2">
                เลือกสถานที่ <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </button>
            <div id="locationDropdown" class="dropdown-content"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="mb-10 border-l-4 border-blue-500 pl-8 text-white italic">
            <h2 id="locName" class="text-5xl font-bold mb-2 uppercase">กำลังโหลด...</h2>
            <p id="locCoords" class="font-mono text-blue-400/80 text-sm">LAT: -- | LON: --</p>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-8">
            <div id="card-temp_c" onclick="setMetric('temp_c')" class="card-glass stat-card active-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-orange-500/10 rounded-xl text-orange-500"><i data-lucide="thermometer" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Temp</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statTemp" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">°C</span>
                </div>
            </div>

            <div id="card-rh" onclick="setMetric('rh')" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-blue-500/10 rounded-xl text-blue-500"><i data-lucide="droplets" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Humid</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statHumid" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">%</span>
                </div>
            </div>

            <div id="card-wind_ms" onclick="setMetric('wind_ms')" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-indigo-500/10 rounded-xl text-indigo-500"><i data-lucide="wind" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Wind</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statWind" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">m/s</span>
                </div>
            </div>

            <div id="card-cloud_lv14" onclick="setMetric('cloud_lv14')" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-slate-500/10 rounded-xl text-slate-300"><i data-lucide="cloud" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Cloud</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statCloud" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">%</span>
                </div>
            </div>

            <div id="card-solar_w" onclick="setMetric('solar_w')" class="card-glass stat-card lg:col-span-1 col-span-2">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-yellow-500/10 rounded-xl text-yellow-500"><i data-lucide="sun" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Solar</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statSolar" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">W/m²</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 card-glass p-8 rounded-[32px]">
                <div class="flex justify-between items-center mb-8">
                    <h3 id="chartTitle" class="font-bold text-lg text-white uppercase tracking-widest">แนวโน้มวันนี้</h3>
                    <div class="flex gap-2 bg-slate-800/50 p-1 rounded-xl">
                        <button id="btnHourly" onclick="updateChartMode('hourly')" class="active-btn text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all">รายชั่วโมง</button>
                        <button id="btnDaily" onclick="updateChartMode('daily')" class="text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all">7 วัน (เฉลี่ย)</button>
                    </div>
                </div>
                <div class="h-[350px] w-full">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>

            <div class="card-glass p-8 rounded-[32px]">
                <h4 id="sideTitle" class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10 text-center">รายละเอียด</h4>
                <div id="sideContainer" class="grid grid-cols-2 gap-4"></div>
                <div class="mt-8 text-center bg-slate-800/30 p-4 rounded-2xl">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">
                        Data provided by <br><span class="text-blue-400 font-bold italic">WRF Simulation Model</span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let weatherChart;
        let weatherData = {};
        let currentStation = "";
        let currentMetric = 'temp_c';
        let currentMode = 'hourly';

        // การตั้งค่าสีและหน่วยของแต่ละตัวแปร
        const configMap = {
            temp_c: { label: 'อุณหภูมิ', unit: '°C', color: '#3b82f6', bg: 'rgba(59, 130, 246, 0.1)' },
            rh: { label: 'ความชื้น', unit: '%', color: '#10b981', bg: 'rgba(16, 185, 129, 0.1)' },
            wind_ms: { label: 'ความเร็วลม', unit: 'm/s', color: '#818cf8', bg: 'rgba(129, 140, 248, 0.1)' },
            solar_w: { label: 'ความเข้มแสง', unit: 'W/m²', color: '#fbbf24', bg: 'rgba(251, 191, 36, 0.1)' },
            cloud_lv14: { label: 'ปริมาณเมฆ', unit: '%', color: '#94a3b8', bg: 'rgba(148, 163, 184, 0.1)' }
        };

        function initChart() {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            weatherChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderWidth: 3, tension: 0.3, fill: true, pointRadius: 2 }]},
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 }, maxRotation: 45, minRotation: 45 } } 
                    }
                }
            });
        }

        async function fetchData() {
            try {
                const response = await fetch('weather_data_locations.json?t=' + Date.now());
                weatherData = await response.json();
                const stations = Object.keys(weatherData);
                
                const container = document.getElementById('locationDropdown');
                container.innerHTML = stations.map(name => `
                    <a href="#" onclick="updateUI('${name}')" class="block px-4 py-3 hover:bg-blue-600 text-sm border-t border-slate-700 first:border-0">${name}</a>
                `).join('');

                if (!currentStation) currentStation = stations[0];
                updateUI(currentStation);
            } catch (e) { console.error("Error fetching JSON:", e); }
        }

        function setMetric(metric) {
            currentMetric = metric;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-card'));
            document.getElementById(`card-${metric}`).classList.add('active-card');
            updateChartMode(currentMode);
        }

        function updateUI(name) {
            currentStation = name;
            const station = weatherData[name];
            const latest = station.data[station.data.length - 1];

            document.getElementById('locName').innerText = name;
            document.getElementById('locCoords').innerText = `LAT: ${station.metadata.actual_lat.toFixed(4)} | LON: ${station.metadata.actual_lon.toFixed(4)}`;
            
            document.getElementById('statTemp').innerText = latest.temp_c.toFixed(1);
            document.getElementById('statHumid').innerText = latest.rh.toFixed(0);
            document.getElementById('statWind').innerText = latest.wind_ms.toFixed(1);
            document.getElementById('statSolar').innerText = latest.solar_w.toFixed(0);
            document.getElementById('statCloud').innerText = latest.cloud_lv14.toFixed(0);

            updateChartMode(currentMode);
        }

        function updateChartMode(mode) {
            currentMode = mode;
            const station = weatherData[currentStation];
            const cfg = configMap[currentMetric];

            document.getElementById('btnHourly').classList.toggle('active-btn', mode === 'hourly');
            document.getElementById('btnDaily').classList.toggle('active-btn', mode === 'daily');
            document.getElementById('chartTitle').innerText = `แนวโน้ม${cfg.label} (${mode==='hourly'?'24 ชม.':'7 วัน'})`;

            weatherChart.data.datasets[0].borderColor = cfg.color;
            weatherChart.data.datasets[0].backgroundColor = cfg.bg;
            weatherChart.data.datasets[0].pointBackgroundColor = cfg.color;

            if (mode === 'hourly') {
                // แสดงผลครบทุกชั่วโมงที่มีในข้อมูล (ปกติ WRF จะให้มา 24-48 ชม.)
                weatherChart.data.labels = station.data.map(d => d.datetime.split(' ')[1].substring(0,5));
                weatherChart.data.datasets[0].data = station.data.map(d => d[currentMetric]);
                
                // Side Cards: แสดง 6 ช่วงเวลาล่าสุด
                renderSide(station.data.slice(-8).reverse(), 'hourly');
            } else {
                // คำนวณค่าเฉลี่ยรายวัน
                const daily = calculateDaily(station.data);
                weatherChart.data.labels = daily.map(d => d.label);
                weatherChart.data.datasets[0].data = daily.map(d => d.val);
                
                renderSide(daily, 'daily');
            }
            weatherChart.update();
        }

        function calculateDaily(data) {
            const groups = {};
            data.forEach(d => {
                const dateStr = d.datetime.split(' ')[0];
                if (!groups[dateStr]) groups[dateStr] = { sum: 0, count: 0 };
                groups[dateStr].sum += d[currentMetric];
                groups[dateStr].count++;
            });

            // แปลง Object เป็น Array และเรียงลำดับวันที่
            return Object.keys(groups).sort().map(date => ({
                label: new Date(date).toLocaleDateString('th-TH', {day:'numeric', month:'short'}),
                val: (groups[date].sum / groups[date].count).toFixed(1)
            }));
        }

        function renderSide(items, mode) {
            const container = document.getElementById('sideContainer');
            const cfg = configMap[currentMetric];
            
            container.innerHTML = items.map(d => `
                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-700/50 text-center transition-all hover:border-blue-500/50">
                    <p class="text-[9px] mb-1 opacity-50 text-blue-400 uppercase font-bold">
                        ${mode === 'hourly' ? d.datetime.split(' ')[1].substring(0,5) : d.label}
                    </p>
                    <p class="text-lg font-bold text-white">${mode === 'hourly' ? d[currentMetric].toFixed(1) : d.val}<span class="text-[10px] ml-0.5 font-normal opacity-40">${cfg.unit}</span></p>
                </div>
            `).join('');
        }

        initChart();
        fetchData();
        setInterval(fetchData, 300000); // อัปเดตข้อมูลทุก 5 นาที
    </script>
</body>
</html>

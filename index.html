<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASS Weather Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap');
        
        :root {
            --bg-deep: #050a15;
            --card-bg: #111a2d;
            --neon-blue: #3b82f6;
            --neon-orange: #fb923c;
            --neon-green: #4ade80;
            --neon-yellow: #facc15;
        }

        body { 
            font-family: 'Chakra+Petch', sans-serif; 
            background-color: var(--bg-deep); 
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* สำหรับจอมือถือกลางแจ้ง - เน้น Contrast */
        .stat-card {
            background: var(--card-bg);
            border: 2px solid #1e293b;
            border-radius: 20px;
            transition: all 0.2s ease;
        }

        .active-card-temp  { border-color: var(--neon-orange); box-shadow: 0 0 15px rgba(251, 146, 60, 0.3); }
        .active-card-rh2   { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .active-card-wind  { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); }
        .active-card-solar { border-color: var(--neon-yellow); box-shadow: 0 0 15px rgba(250, 204, 21, 0.3); }

        .dropdown-content {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 10, 21, 0.95);
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }

        .btn-range {
            background: #1e293b;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
        }

        .btn-range.active {
            background: var(--neon-blue);
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* ตกแต่งกราฟให้เส้นหนาขึ้น มองง่าย */
        #chartWrapper {
            position: relative;
            height: 250px;
            width: 100%;
        }
    </style>
</head>
<body class="safe-top pb-10">

    <header class="p-6 flex justify-between items-center bg-[#0a1120] border-b border-slate-800 sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-blue-500">CASS <span class="text-white">INTEL</span></h1>
            <div id="currentTimeDisp" class="text-[10px] font-bold text-emerald-400">SYNCING...</div>
        </div>
        <button onclick="toggleLocationMenu()" class="bg-blue-600 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2">
            <i data-lucide="map"></i> เลือกสถานที่
        </button>
    </header>

    <section class="p-6">
        <h2 id="locName" class="text-4xl font-black mb-1 leading-none tracking-tight">กำลังโหลด...</h2>
        <p id="locDetail" class="text-slate-500 text-sm font-medium uppercase tracking-tighter italic">--</p>
        <div id="locCoords" class="text-[10px] font-mono text-blue-400 mt-1 opacity-70">--</div>
    </section>

    <section class="px-6 grid grid-cols-2 gap-3 mb-6">
        <div id="card-temp_c" onclick="setMetric('temp_c', this)" class="stat-card p-4 active-card-temp">
            <div class="flex items-center gap-2 mb-2 text-orange-400">
                <i data-lucide="thermometer" class="w-4 h-4"></i> <span class="text-[10px] font-bold">TEMP</span>
            </div>
            <div class="text-3xl font-bold"><span id="tempVal">--</span><span class="text-lg opacity-40">°C</span></div>
        </div>
        <div id="card-rh2" onclick="setMetric('rh2', this)" class="stat-card p-4">
            <div class="flex items-center gap-2 mb-2 text-blue-400">
                <i data-lucide="droplets" class="w-4 h-4"></i> <span class="text-[10px] font-bold">HUMID</span>
            </div>
            <div class="text-3xl font-bold"><span id="humidVal">--</span><span class="text-lg opacity-40">%</span></div>
        </div>
        <div id="card-wind_ms" onclick="setMetric('wind_ms', this)" class="stat-card p-4">
            <div class="flex items-center gap-2 mb-2 text-green-400">
                <i data-lucide="wind" class="w-4 h-4"></i> <span class="text-[10px] font-bold">WIND</span>
            </div>
            <div class="text-3xl font-bold"><span id="windVal">--</span><span class="text-xs opacity-40 ml-1">m/s</span></div>
        </div>
        <div id="card-solar_w" onclick="setMetric('solar_w', this)" class="stat-card p-4">
            <div class="flex items-center gap-2 mb-2 text-yellow-400">
                <i data-lucide="sun" class="w-4 h-4"></i> <span class="text-[10px] font-bold">SOLAR</span>
            </div>
            <div class="text-3xl font-bold"><span id="solarVal">--</span><span class="text-[10px] opacity-40 ml-1">W/m²</span></div>
        </div>
    </section>

    <section class="mx-6 p-5 rounded-[24px] bg-[#0d1526] border border-slate-800">
        <div class="flex justify-between items-center mb-6">
            <h3 id="chartTitle" class="text-xs font-bold uppercase tracking-widest text-slate-400">TREND</h3>
            <div class="flex gap-1">
                <button id="btn-hourly" onclick="setRange('hourly')" class="btn-range active text-[10px]">24H</button>
                <button id="btn-daily" onclick="setRange('daily')" class="btn-range text-[10px]">7D</button>
            </div>
        </div>
        <div id="chartWrapper">
            <canvas id="weatherChart"></canvas>
        </div>
    </section>

    <section class="mt-6">
        <h4 class="px-6 text-[10px] font-bold text-slate-500 uppercase mb-3">Timeline Details</h4>
        <div id="timeBlocks" class="flex overflow-x-auto gap-3 px-6 pb-4 no-scrollbar">
            </div>
    </section>

    <div id="locationMenu" class="dropdown-content">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">เลือกอำเภอ / หมู่บ้าน</h2>
            <button onclick="toggleLocationMenu()" class="p-2 bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="locationOptions" class="space-y-6">
            </div>
    </div>

    <script>
        lucide.createIcons();
        let weatherChart, districtData = [], currentDistrictIdx = 0, currentVillageIdx = 0, currentMetric = "temp_c", currentRange = "hourly";
        
        const metricConfig = {
            temp_c: { label: "อุณหภูมิ", unit: "°C", color: "#fb923c" },
            rh2: { label: "ความชื้น", unit: "%", color: "#3b82f6" },
            wind_ms: { label: "ความเร็วลม", unit: "m/s", color: "#4ade80" },
            solar_w: { label: "รังสีอาทิตย์", unit: "W/m²", color: "#facc15" }
        };

        // 1. Initialize Chart (เน้นเส้นหนาและจุดใหญ่ขึ้นเพื่อสู้แสง)
        const ctx = document.getElementById('weatherChart').getContext('2d');
        weatherChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], fill: true, tension: 0.4, borderWidth: 5, pointRadius: 5, pointBackgroundColor: '#fff' }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } }, 
                scales: { 
                    y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b', font: { size: 10 } } }, 
                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } } 
                } 
            }
        });

        async function init() {
            try {
                const res = await fetch('weather_data_locations.json?t=' + Date.now());
                const json = await res.json();
                districtData = json.districts;
                
                // สร้างเมนูเลือกสถานที่
                const menu = document.getElementById('locationOptions');
                menu.innerHTML = districtData.map((dist, dIdx) => `
                    <div class="mb-4">
                        <h3 class="text-blue-400 font-bold mb-2 border-l-2 border-blue-500 pl-3">${dist.name}</h3>
                        <div class="grid grid-cols-1 gap-2">
                            ${dist.villages.map((vil, vIdx) => `
                                <button onclick="selectVillage(${dIdx}, ${vIdx})" class="w-full text-left bg-slate-800/50 p-4 rounded-xl text-sm font-medium border border-slate-700">
                                    ${vil.village_name}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                selectVillage(0, 0); 
            } catch (e) { console.error(e); }
        }

        function toggleLocationMenu() {
            const menu = document.getElementById('locationMenu');
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        }

        function selectVillage(dIdx, vIdx) {
            currentDistrictIdx = dIdx; currentVillageIdx = vIdx;
            updateDashboard();
            document.getElementById('locationMenu').style.display = 'none';
        }

        function updateDashboard() {
            if (!districtData.length) return;
            const village = districtData[currentDistrictIdx].villages[currentVillageIdx];
            const rawWeather = village.weather_data;
            const now = new Date();
            const currentHour = now.getHours();
            const todayStr = now.toLocaleDateString('en-CA');

            let currentData = rawWeather.find(d => {
                const h = (parseInt(d.datetime.split(' ')[1].split(':')[0]) + 7) % 24;
                return h === currentHour; 
            }) || rawWeather[rawWeather.length - 1];

            document.getElementById('locName').innerText = village.village_name;
            document.getElementById('locDetail').innerText = `ตำบล${village.subdistrict} อำเภอ${village.district}`;
            document.getElementById('locCoords').innerText = `LAT: ${village.coordinates.model_lat.toFixed(4)} LON: ${village.coordinates.model_lon.toFixed(4)}`;
            document.getElementById('currentTimeDisp').innerText = `LOCAL SYNC: ${now.toLocaleTimeString('th-TH')}`;

            document.getElementById('tempVal').innerText = parseFloat(currentData.temp_c).toFixed(1);
            document.getElementById('humidVal').innerText = parseFloat(currentData.rh2).toFixed(1);
            document.getElementById('windVal').innerText = parseFloat(currentData.wind_ms).toFixed(1);
            
            const solarVal = (currentHour < 6 || currentHour > 18) ? 0 : parseFloat(currentData.solar_w || 0);
            document.getElementById('solarVal').innerText = solarVal.toFixed(0);

            renderChart(rawWeather);
        }

        function renderChart(weatherArray) {
            const config = metricConfig[currentMetric];
            let labels = [], values = [];

            if (currentRange === 'hourly') {
                labels = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
                values = new Array(24).fill(null);
                const baseDate = weatherArray[0].datetime.split(' ')[0];
                weatherArray.forEach(d => {
                    if (d.datetime.startsWith(baseDate)) {
                        const localHour = (parseInt(d.datetime.split(' ')[1].split(':')[0]) + 7) % 24;
                        values[localHour] = d[currentMetric];
                    }
                });
            } else {
                const dayMap = {};
                weatherArray.forEach(d => {
                    let dt = new Date(d.datetime.replace(" ", "T") + "Z");
                    dt.setHours(dt.getHours() + 7);
                    const k = dt.toLocaleDateString('en-CA');
                    if (!dayMap[k]) dayMap[k] = { s: 0, c: 0 };
                    const v = parseFloat(d[currentMetric]);
                    if (!isNaN(v)) { dayMap[k].s += v; dayMap[k].c++; }
                });
                for (let i = 0; i < 7; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const k = d.toLocaleDateString('en-CA');
                    labels.push(d.toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                    values.push(dayMap[k] && dayMap[k].c > 0 ? (dayMap[k].s / dayMap[k].c).toFixed(1) : null);
                }
            }

            weatherChart.data.labels = labels;
            weatherChart.data.datasets[0].data = values;
            weatherChart.data.datasets[0].borderColor = config.color;
            weatherChart.data.datasets[0].backgroundColor = config.color + '15';
            weatherChart.update();

            document.getElementById('chartTitle').innerText = `${config.label} TREND`;
            
            document.getElementById('timeBlocks').innerHTML = labels.map((l, i) => {
                if (values[i] === null) return '';
                return `<div class="min-w-[100px] bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 text-center">
                    <div class="text-[9px] text-slate-500 font-bold mb-1 uppercase">${l}</div>
                    <div class="text-lg font-bold">${values[i]}</div>
                    <div class="text-[8px] opacity-40">${config.unit}</div>
                </div>`;
            }).join('');
        }

        function setMetric(m, el) {
            currentMetric = m;
            document.querySelectorAll('.stat-card').forEach(c => {
                c.className = "stat-card p-4";
            });
            el.classList.add('active-card-' + m.split('_')[0]);
            updateDashboard();
        }

        function setRange(r) {
            currentRange = r;
            document.getElementById('btn-hourly').classList.toggle('active', r === 'hourly');
            document.getElementById('btn-daily').classList.toggle('active', r === 'daily');
            updateDashboard();
        }

        init();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CASS Weather Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <style>

		/* รวมเป็นก้อนเดียวเพื่อให้ทำงานครบทุกคำสั่ง */
		.chart-scroll-wrapper { 
			position: relative; /* สำคัญสำหรับการตรึงแกน Y */
			width: 100%; 
			overflow-x: auto; 
			padding-bottom: 10px; 
			-webkit-overflow-scrolling: touch; /* เพิ่มเพื่อให้เลื่อนในมือถือลื่นขึ้น */
		}

		.chart-inner-container { 
			min-width: 1200px; 
			height: 320px; 
		}

        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Inter:wght@400;600&display=swap');
        
        :root {
            --bg-deep: #050a15;
            --card-bg: #0e1525;
            --neon-blue: #3b82f6;
            --neon-orange: #fb923c;
            --neon-green: #22c55e;
            --neon-cyan: #06b6d4;
            --neon-yellow: #eab308;
        }

			/* นำเข้าฟอนต์ Inter และสร้าง class ควบคุมหน่วย */

		.unit-text {
			font-family: 'Inter', sans-serif;
			text-transform: none !important;
			letter-spacing: 0;
		}

        body { 
            font-family: 'Chakra+Petch', sans-serif; 
            background-color: var(--bg-deep); 
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Dropdown Style เหมือนเดิม */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #111a2d;
            min-width: 180px;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            z-index: 100;
            border-radius: 12px;
            border: 1px solid #1e293b;
            margin-top: 8px;
            overflow: hidden;
        }

        /* Stat Cards สำหรับกลางแจ้ง */
        .stat-card {
            background: var(--card-bg);
            border: 2px solid #1e293b;
            border-radius: 24px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .active-card-temp   { border-color: var(--neon-orange); box-shadow: 0 0 15px rgba(251, 146, 60, 0.3); }
        .active-card-rh2    { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .active-card-wind   { border-color: var(--neon-green); box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .active-card-rain   { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .active-card-cloud  { border-color: #94a3b8; box-shadow: 0 0 15px rgba(148, 163, 184, 0.3); }
        .active-card-solar  { border-color: var(--neon-yellow); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }

        .btn-range {
            background: #1e293b;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 11px;
        }

        .btn-range.active {
            background: var(--neon-blue);
            color: white;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 bg-[#0a1120] border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col gap-4">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-black italic tracking-tighter text-blue-500 uppercase">CASS <span class="text-white">Weather</span></h1>
                <div id="currentTimeDisp" class="text-[9px] font-mono font-bold text-emerald-400 uppercase">UTC+7 SYNCING</div>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-start" id="districtControls">
                <div class="relative">
                    <button onclick="toggleDropdown(0)" id="btn-dist-0" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-1">
                        เมืองสกลนคร <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                    <div id="dropdown-0" class="dropdown-content"></div>
                </div>
                <div class="relative">
                    <button onclick="toggleDropdown(1)" id="btn-dist-1" class="card-glass text-slate-300 px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-1 border border-slate-700">
                        โคกศรีสุพรรณ <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                    <div id="dropdown-1" class="dropdown-content"></div>
                </div>
                <div class="relative">
                    <button onclick="toggleDropdown(2)" id="btn-dist-2" class="card-glass text-slate-300 px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-1 border border-slate-700">
                        โพนนาแก้ว <i data-lucide="chevron-down" class="w-3 h-3"></i>
                    </button>
                    <div id="dropdown-2" class="dropdown-content"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <section class="mb-8">
            <h2 id="locName" class="text-5xl font-black mb-1 leading-none tracking-tighter text-white">กำลังโหลด...</h2>
            <p id="locDetail" class="text-slate-500 text-xs font-medium uppercase tracking-widest italic">--</p>
            <div id="locCoords" class="text-[9px] font-mono text-blue-400 mt-2 opacity-60">--</div>
        </section>

        <section class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-8">
            <div id="card-temp_c" onclick="setMetric('temp_c', this)" class="stat-card p-5 active-card-temp">
                <div class="flex items-center gap-2 mb-2 text-orange-400"><i data-lucide="thermometer" class="w-4 h-4"></i> <span class="text-base font-black uppercase">อุณหภูมิ</span></div>
                <div class="text-4xl font-bold text-white"><span id="tempVal">--</span><span class="text-lg opacity-30">°C</span></div>
            </div>
            <div id="card-rh2" onclick="setMetric('rh2', this)" class="stat-card p-5">
                <div class="flex items-center gap-2 mb-2 text-blue-400"><i data-lucide="droplets" class="w-4 h-4"></i> <span class="text-base font-black uppercase">ความชื้น</span></div>
                <div class="text-4xl font-bold text-white"><span id="humidVal">--</span><span class="text-lg opacity-30"></span>%</div>
            </div>
            <div id="card-wind_ms" onclick="setMetric('wind_ms', this)" class="stat-card p-5">
                <div class="flex items-center gap-2 mb-2 text-green-400"><i data-lucide="wind" class="w-4 h-4"></i> <span class="text-base font-black uppercase">แรงลม</span></div>
                <div class="text-4xl font-bold text-white"><span id="windVal">--</span><span class="text-xs opacity-30 ml-1">m/s</span></div>
            </div>
            <div id="card-rain_mm" onclick="setMetric('rain_mm', this)" class="stat-card p-5">
                <div class="flex items-center gap-2 mb-2 text-cyan-400"><i data-lucide="cloud-rain" class="w-4 h-4"></i> <span class="text-base font-black uppercase">น้ำฝน</span></div>
                <div class="text-4xl font-bold text-white"><span id="rainVal">--</span><span class="text-xs opacity-30 ml-1">mm</span></div>
            </div>
            <div id="card-cloud_lv14" onclick="setMetric('cloud_lv14', this)" class="stat-card p-5">
                <div class="flex items-center gap-2 mb-2 text-slate-400"><i data-lucide="cloud" class="w-4 h-4"></i> <span class="text-base font-black uppercase">เมฆ</span></div>
                <div class="text-4xl font-bold text-white"><span id="cloudVal">--</span><span class="text-lg opacity-30"></span></div>
            </div>
            <div id="card-solar_w" onclick="setMetric('solar_w', this)" class="stat-card p-5">
                <div class="flex items-center gap-2 mb-2 text-yellow-400"><i data-lucide="sun" class="w-4 h-4"></i> <span class="text-base font-black uppercase">แสงแดด</span></div>
                <div class="text-4xl font-bold text-white"><span id="solarVal">--</span><span class="text-[10px] opacity-30 ml-1">W/m²</span></div>
            </div>
        </section>

        <section class="p-6 rounded-[32px] bg-[#0d1526] border border-slate-800 shadow-2xl mb-8">
            <div class="flex justify-between items-center mb-6">
                <h3 id="chartTitle" class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500">แนวโน้ม</h3>
                <div class="flex gap-1 bg-slate-900 p-1 rounded-xl">
                    <button id="btn-hourly" onclick="setRange('hourly')" class="btn-range active">1วัน</button>
                    <button id="btn-daily" onclick="setRange('daily')" class="btn-range">7วัน</button>
                </div>
            </div>
            <div class="relative h-[300px]">
				<canvas id="axisChart" class="absolute top-0 left-0 z-10" style="width: 50px; height: 100%; pointer-events: none; background: #0d1526;"></canvas>
				
				<div class="chart-scroll-wrapper no-scrollbar h-full pl-[45px]">
					<div class="chart-inner-container h-full">
						<canvas id="weatherChart"></canvas>
					</div>
				</div>
			</div>
        </section>

        <section>
            <h4 class="text-[10px] font-black text-slate-600 uppercase tracking-widest mb-4">Timeline Details</h4>
            <div id="timeBlocks" class="flex overflow-x-auto gap-3 pb-4 no-scrollbar"></div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        let weatherChart, districtData = [], currentDistrictIdx = 0, currentVillageIdx = 0, currentMetric = "temp_c", currentRange = "hourly";
        let axisChart;
        
        const metricConfig = {
            temp_c: { label: "อุณหภูมิ", unit: "°C", color: "#fb923c" },
            rh2: { label: "ความชื้น", unit: "%", color: "#3b82f6" },
            wind_ms: { label: "แรงลม", unit: "m/s", color: "#4ade80" },
            rain_mm: { label: "น้ำฝน", unit: "mm", color: "#22d3ee" },
            cloud_lv14: { label: "เมฆ", unit: "%", color: "#94a3b8" },
            solar_w: { label: "แสงแดด", unit: "W/m²", color: "#facc15" }
        };

        const axisCanvas = document.getElementById('axisChart');
        const axisCtx = axisCanvas.getContext('2d');
        const ctx = document.getElementById('weatherChart').getContext('2d');

        weatherChart = new Chart(ctx, {
            type: 'line',
            plugins: [ChartDataLabels], // ลงทะเบียน plugin
            data: { 
                labels: [], 
                datasets: [{ 
                    label: '', 
                    data: [], 
                    fill: true, 
                    tension: 0.45, 
                    borderWidth: 5, 
                    pointRadius: 5, 
                    pointBackgroundColor: '#fff' 
                }] 
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                plugins: {
                    legend: { display: false }, // ปิด Legend
                    datalabels: { // ย้ายเข้ามาอยู่ใน plugins
                        display: true,
                        align: 'top',
                        anchor: 'end',
                        color: '#ffffff',
                        offset: 4,
                        font: {
                            size: 11,
                            weight: 'bold'
                        },
                        formatter: (value) => value !== null ? parseFloat(value).toFixed(1) : ''
                    }
                },
                layout: {
                    padding: { left: 0, top: 20 } // เพิ่ม top padding เพื่อไม่ให้ตัวเลขบนจุดโดนขอบตัด
                },
                scales: { 
                    y: { 
                        display: true, 
                        grid: { color: 'rgba(255,255,255,0.12)', lineWidth: 1 },
                        ticks: { display: false },
                        afterFit: (axis) => { axis.width = 50; } // ตรึงความกว้างแกน Y
                    },
                    x: {
                        // เพิ่มขนาดฟอนต์แกน X เป็น 13 และปรับความหนาเป็น 600
                        ticks: { 
                            color: '#94a3b8', 
                            font: { 
                                size: 13,
                                weight: '600'
                            },
                            padding: 10
                        },
                        grid: { display: false }
                    }
                },
                animation: { 
                    onComplete: function() { drawFixedAxis(this); } 
                }
            }
        });

        // ฟังก์ชันวาดแกน Y แยกต่างหากเพื่อล็อคตำแหน่ง (คงเดิม)
        function drawFixedAxis(chart) {
            const yAxis = chart.scales.y;
            axisCanvas.height = chart.height;
            axisCanvas.width = 50; 
            
            axisCtx.clearRect(0, 0, 50, chart.height);
            axisCtx.font = "bold 12px sans-serif"; 
            axisCtx.fillStyle = "#94a3b8";
            axisCtx.textAlign = "right";
            
            yAxis.ticks.forEach((tick) => {
                const y = yAxis.getPixelForValue(tick.value);
                axisCtx.fillText(tick.label, 40, y + 4);
            });
        }

        async function init() {
            try {
                const res = await fetch('weather_data_locations.json?t=' + Date.now());
                const json = await res.json();
                districtData = json.districts;
                
                districtData.forEach((dist, dIdx) => {
                    const dropdown = document.getElementById(`dropdown-${dIdx}`);
                    if (dropdown) {
                        dropdown.innerHTML = dist.villages.map((vil, vIdx) => `
                            <button onclick="selectVillage(${dIdx}, ${vIdx})" class="block w-full text-left px-4 py-3 hover:bg-blue-600/20 text-xs text-slate-300 border-b border-slate-700/50 last:border-0 active:bg-blue-600 active:text-white transition-all">
                                ${vil.village_name}
                            </button>`).join('');
                    }
                });
                selectVillage(0, 0); 
            } catch (e) { console.error(e); }
        }

        function toggleDropdown(idx) {
            const el = document.getElementById(`dropdown-${idx}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll(".dropdown-content").forEach(d => d.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function selectVillage(dIdx, vIdx) {
            currentDistrictIdx = dIdx; currentVillageIdx = vIdx;
            
            // สลับสีปุ่มอำเภอ
            [0, 1, 2].forEach(i => {
                const btn = document.getElementById(`btn-dist-${i}`);
                if (btn) btn.className = (i === dIdx) ? "bg-blue-600 text-white px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-1" : "card-glass text-slate-300 px-4 py-2 rounded-full text-[11px] font-bold flex items-center gap-1 border border-slate-700";
            });

            updateDashboard();
            document.querySelectorAll(".dropdown-content").forEach(d => d.style.display = 'none');
        }

        function updateDashboard() {
            if (!districtData.length) return;
            const village = districtData[currentDistrictIdx].villages[currentVillageIdx];
            const weather = village.weather_data;
            const now = new Date();
            const curH = now.getHours();

            // ค้นหาข้อมูลชั่วโมงปัจจุบัน (บวก 7 จาก JSON)
            let matchedData = weather.find(d => {
                let h = (parseInt(d.datetime.split(' ')[1].split(':')[0]) + 7) % 24;
                return h === curH;
            }) || weather[weather.length - 1];

            document.getElementById('locName').innerText = village.village_name;
            document.getElementById('locDetail').innerText = `ตำบล${village.subdistrict} อำเภอ${village.district} จ.สกลนคร`;
            document.getElementById('locCoords').innerHTML = `TARGET: ${village.coordinates.target_lat} | MODEL: ${village.coordinates.model_lat.toFixed(3)}`;
            document.getElementById('currentTimeDisp').innerText = `SYNCED: ${now.toLocaleTimeString('th-TH')}`;

            document.getElementById('tempVal').innerText = parseFloat(matchedData.temp_c).toFixed(1);
            document.getElementById('humidVal').innerText = parseFloat(matchedData.rh2).toFixed(1);
            document.getElementById('windVal').innerText = parseFloat(matchedData.wind_ms).toFixed(1);
            document.getElementById('rainVal').innerText = parseFloat(matchedData.rain_mm).toFixed(1);
            document.getElementById('cloudVal').innerText = parseFloat(matchedData.cloud_lv14).toFixed(0);
            
            const solar = (curH < 6 || curH > 18) ? 0 : parseFloat(matchedData.solar_w || 0);
            document.getElementById('solarVal').innerText = solar.toFixed(0);

            renderWeatherChart(weather);
        }

        function renderWeatherChart(weatherArray) {
            const config = metricConfig[currentMetric];
            let labels = [], values = [];

            if (currentRange === 'hourly') {
                labels = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
                values = new Array(24).fill(null);
                const baseDate = weatherArray[0].datetime.split(' ')[0];
                weatherArray.forEach(d => {
                    if (d.datetime.startsWith(baseDate)) {
                        const localH = (parseInt(d.datetime.split(' ')[1].split(':')[0]) + 7) % 24;
                        values[localH] = d[currentMetric];
                    }
                });
            } else {
                const dayMap = {};
                weatherArray.forEach(d => {
                    let dt = new Date(d.datetime.replace(" ", "T") + "Z");
                    dt.setHours(dt.getHours() + 7);
                    const k = dt.toLocaleDateString('en-CA');
                    if (!dayMap[k]) dayMap[k] = { s: 0, c: 0 };
                    const v = parseFloat(d[currentMetric]);
                    if (!isNaN(v)) { dayMap[k].s += v; dayMap[k].c++; }
                });
                for (let i = 0; i < 7; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const k = d.toLocaleDateString('en-CA');
                    labels.push(d.toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                    values.push(dayMap[k] && dayMap[k].c > 0 ? (dayMap[k].s / dayMap[k].c).toFixed(1) : null);
                }
            }

            weatherChart.data.labels = labels;
            weatherChart.data.datasets[0].data = values;
            weatherChart.data.datasets[0].borderColor = config.color;
            weatherChart.data.datasets[0].backgroundColor = config.color + '15';
            weatherChart.update();

            document.getElementById('chartTitle').innerText = `พยากรณ์${config.label}`;
            document.getElementById('timeBlocks').innerHTML = labels.map((l, i) => {
                if (values[i] === null) return '';
                return `<div class="min-w-[110px] bg-[#111a2d] p-5 rounded-2xl border border-slate-800 text-center">
                    <div class="text-[16px] text-slate-500 font-bold mb-1 uppercase">${l}</div>
                    <div class="text-xl font-bold">${values[i]}</div>
                    <div class="unit-text text-[12px] text-slate-500 font-bold mt-1 uppercase">${config.unit}</div>
                </div>`;
            }).join('');
        }

        function setMetric(m, el) {
            currentMetric = m;
            document.querySelectorAll('.stat-card').forEach(c => c.className = "stat-card p-5");
            const type = m.split('_')[0]; 
            el.classList.add('active-card-' + type);
            updateDashboard();
        }

        function setRange(r) {
            currentRange = r;
            document.getElementById('btn-hourly').className = (r === 'hourly') ? "btn-range active" : "btn-range";
            document.getElementById('btn-daily').className = (r === 'daily') ? "btn-range active" : "btn-range";
            updateDashboard();
        }

        init();
        setInterval(updateDashboard, 60000);
        
        // ปิด Dropdown เมื่อกดที่อื่น
        window.onclick = function(event) {
            if (!event.target.matches('button')) {
                document.querySelectorAll(".dropdown-content").forEach(d => d.style.display = 'none');
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASS | Village Weather Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { font-family: 'Chakra+Petch', sans-serif; background-color: #0f172a; color: #cbd5e1; min-height: 100 screen; }
        .card-glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(10px); }
        .dropdown-content { display: none; position: absolute; background-color: #1e293b; min-width: 220px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 12px; border: 1px solid #334155; margin-top: 8px; overflow: hidden; }
        .stat-card { border-radius: 24px; padding: 1.5rem; transition: all 0.3s ease; border: 2px solid transparent; cursor: pointer; }
        .stat-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .active-card { border-color: #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
        .active-btn { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-3">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30">
                <i data-lucide="map-pin" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase">CASS <span class="text-blue-400 font-light">VILLAGE</span></h1>
        </div>

        <div class="flex flex-wrap justify-center gap-3" id="districtControls">
            <div class="relative">
                <button onclick="toggleDropdown(0)" id="btn-dist-0" class="bg-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2">
                    เมืองสกลนคร <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </button>
                <div id="dropdown-0" class="dropdown-content"></div>
            </div>
            <div class="relative">
                <button onclick="toggleDropdown(1)" id="btn-dist-1" class="card-glass text-slate-300 px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 border border-slate-700">
                    โคกศรีสุพรรณ <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </button>
                <div id="dropdown-1" class="dropdown-content"></div>
            </div>
            <div class="relative">
                <button onclick="toggleDropdown(2)" id="btn-dist-2" class="card-glass text-slate-300 px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 border border-slate-700">
                    โพนนาแก้ว <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </button>
                <div id="dropdown-2" class="dropdown-content"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <div class="mb-10 border-l-4 border-blue-500 pl-8 text-white uppercase italic">
            <h2 id="locName" class="text-5xl font-black mb-2 tracking-tighter">กำลังโหลด...</h2>
            <div class="flex flex-col gap-1 text-slate-400 text-sm not-italic uppercase tracking-widest">
                <p id="locDetail">--</p>
                <p id="locCoords" class="font-mono text-blue-400/80 tracking-normal text-xs">LAT: -- | LON: --</p>
                <p id="currentTimeDisp" class="text-[10px] font-bold text-emerald-400 mt-2 uppercase">TIME SYNC (UTC+7)</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <div id="card-temp_c" onclick="setMetric('temp_c', this)" class="card-glass stat-card active-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-orange-500/10 rounded-xl text-orange-500"><i data-lucide="thermometer"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Temp</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="tempVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">°C</span></div>
            </div>
            <div id="card-rh2" onclick="setMetric('rh2', this)" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-blue-500/10 rounded-xl text-blue-500"><i data-lucide="droplets"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Humid</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="humidVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">%</span></div>
            </div>
            <div id="card-wind_ms" onclick="setMetric('wind_ms', this)" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-indigo-500/10 rounded-xl text-indigo-500"><i data-lucide="wind"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Wind</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="windVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">m/s</span></div>
            </div>
            <div id="card-rain_mm" onclick="setMetric('rain_mm', this)" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-emerald-500/10 rounded-xl text-emerald-500"><i data-lucide="cloud-rain"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Rain</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="rainVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">mm</span></div>
            </div>
            <div id="card-cloud_lv14" onclick="setMetric('cloud_lv14', this)" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-slate-500/10 rounded-xl text-slate-300"><i data-lucide="cloud"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Cloud</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="cloudVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-xs">%</span></div>
            </div>
            <div id="card-solar_w" onclick="setMetric('solar_w', this)" class="card-glass stat-card">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-yellow-500/10 rounded-xl text-yellow-500"><i data-lucide="sun"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Solar</span>
                </div>
                <div class="flex items-baseline gap-1"><span id="solarVal" class="text-3xl font-bold text-white">--</span><span class="text-slate-500 text-[10px]">W/m²</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 card-glass p-8 rounded-[32px]">
                <div class="flex justify-between items-center mb-8">
                    <h3 id="chartTitle" class="font-bold text-lg text-white uppercase tracking-widest">แนวโน้มสภาพอากาศ</h3>
                    <div class="flex gap-2 bg-slate-800/50 p-1 rounded-xl">
                        <button id="btn-hourly" onclick="setRange('hourly')" class="active-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all uppercase">24 HR</button>
                        <button id="btn-daily" onclick="setRange('daily')" class="text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all uppercase">7 DAYS</button>
                    </div>
                </div>
                <div class="h-[350px] w-full">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>
            <div class="card-glass p-8 rounded-[32px]">
                <h4 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10 text-center">ข้อมูลโดยละเอียด</h4>
                <div id="timeBlocks" class="grid grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let weatherChart;
        let districtData = [];
        let currentDistrictIdx = 0;
        let currentVillageIdx = 0;
        let currentMetric = "temp_c";
        let currentRange = "hourly";

        const metricUnit = { temp_c: "°C", rh2: "%", wind_ms: "m/s", rain_mm: "mm", cloud_lv14: "%", solar_w: "W/m²" };
        const metricLabel = { temp_c: "อุณหภูมิ", rh2: "ความชื้น", wind_ms: "แรงลม", rain_mm: "ฝน", cloud_lv14: "เมฆ", solar_w: "แสงแดด" };

        const ctx = document.getElementById('weatherChart').getContext('2d');
        weatherChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4, borderWidth: 4, pointRadius: 4, spanGaps: true }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#334155' }, ticks: { color: '#64748b' } }, x: { grid: { display: false }, ticks: { color: '#64748b' } } } }
        });

        async function init() {
            try {
                const res = await fetch('weather_data_locations.json?t=' + Date.now());
                const json = await res.json();
                districtData = json.districts;
                districtData.forEach((dist, dIdx) => {
                    const dropdown = document.getElementById(`dropdown-${dIdx}`);
                    if (dropdown) {
                        dropdown.innerHTML = dist.villages.map((vil, vIdx) => `
                            <button onclick="selectVillage(${dIdx}, ${vIdx})" class="block w-full text-left px-4 py-3 hover:bg-blue-600/30 text-sm text-slate-300 rounded-lg transition-all border-b border-slate-700/50 last:border-0">
                                ${vil.village_name}
                            </button>`).join('');
                    }
                });
                selectVillage(0, 0); 
            } catch (e) { console.error(e); }
        }

        function selectVillage(dIdx, vIdx) {
            currentDistrictIdx = dIdx;
            currentVillageIdx = vIdx;
            [0, 1, 2].forEach(i => {
                const btn = document.getElementById(`btn-dist-${i}`);
                if (btn) btn.className = (i === dIdx) ? "bg-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 transition-all shadow-lg" : "card-glass text-slate-300 px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2 border border-slate-700 transition-all";
            });
            updateDashboard();
            document.querySelectorAll(".dropdown-content").forEach(el => el.style.display = 'none');
        }

        function toggleDropdown(idx) {
            const el = document.getElementById(`dropdown-${idx}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll(".dropdown-content").forEach(d => d.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function updateDashboard() {
            if (!districtData.length) return;
            const village = districtData[currentDistrictIdx].villages[currentVillageIdx];
            const rawWeather = village.weather_data;

            const now = new Date();
            const currentHour = now.getHours(); 
            const todayStr = now.toLocaleDateString('en-CA');

            let currentData = rawWeather.find(d => {
                let dTime = new Date(d.datetime.replace(" ", "T") + "Z"); 
                dTime.setHours(dTime.getHours() + 7); 
                return dTime.getHours() === currentHour && dTime.toLocaleDateString('en-CA') === todayStr;
            }) || rawWeather[rawWeather.length - 1];

            document.getElementById('locName').innerText = village.village_name;
            document.getElementById('locDetail').innerText = `ต.${village.subdistrict} อ.${village.district} จ.${village.province}`;
            document.getElementById('locCoords').innerText = `TARGET LAT: ${village.coordinates.target_lat} | MODEL LAT: ${village.coordinates.model_lat.toFixed(4)}`;
            document.getElementById('currentTimeDisp').innerText = `LAST SYNC (UTC+7): ${now.toLocaleTimeString('th-TH')}`;

            const safe = (val) => (val !== undefined && val !== null) ? val.toFixed(1) : "0.0";
            document.getElementById('tempVal').innerText = safe(currentData.temp_c);
            document.getElementById('humidVal').innerText = safe(currentData.rh2);
            document.getElementById('windVal').innerText = safe(currentData.wind_ms);
            document.getElementById('rainVal').innerText = safe(currentData.rain_mm);
            document.getElementById('cloudVal').innerText = safe(currentData.cloud_lv14);
            
            const solarVal = (currentHour < 6 || currentHour > 18) ? 0 : (currentData.solar_w || 0);
            document.getElementById('solarVal').innerText = solarVal.toFixed(0);

            renderChart(rawWeather);
        }

        function renderChart(weatherArray) {
            const processed = weatherArray.map(d => {
                let dt = new Date(d.datetime.replace(" ", "T") + "Z");
                dt.setHours(dt.getHours() + 7);
                return { ...d, localDt: dt, dateKey: dt.toLocaleDateString('en-CA') };
            });

            let labels = [];
            let values = [];

            if (currentRange === 'hourly') {
                labels = Array.from({length: 24}, (_, i) => `${i.toString().padStart(2, '0')}:00`);
                values = new Array(24).fill(null);
                const todayStr = new Date().toLocaleDateString('en-CA');
                processed.forEach(d => {
                    if (d.dateKey === todayStr) { values[d.localDt.getHours()] = d[currentMetric]; }
                });
            } else {
                const dayMap = {};
                processed.forEach(d => {
                    const k = d.dateKey;
                    if (!dayMap[k]) dayMap[k] = { s: 0, c: 0 };
                    const v = parseFloat(d[currentMetric]);
                    if (!isNaN(v)) { dayMap[k].s += v; dayMap[k].c++; }
                });
                for (let i = 0; i < 7; i++) {
                    const d = new Date(); d.setDate(d.getDate() + i);
                    const k = d.toLocaleDateString('en-CA');
                    labels.push(d.toLocaleDateString('th-TH', {day:'numeric', month:'short'}));
                    values.push(dayMap[k] && dayMap[k].c > 0 ? (dayMap[k].s / dayMap[k].c).toFixed(1) : null);
                }
            }

            weatherChart.data.labels = labels;
            weatherChart.data.datasets[0].data = values;
            weatherChart.update();

            document.getElementById('chartTitle').innerText = `แนวโน้ม${metricLabel[currentMetric]} (${currentRange === 'hourly' ? '24 ชม.' : '7 วัน'})`;
            document.getElementById('timeBlocks').innerHTML = labels.map((l, i) => {
                if (values[i] === null) return '';
                return `<div class="card-glass p-3 rounded-xl border border-slate-700 text-center">
                    <div class="text-[10px] text-slate-500 uppercase mb-1">${l}</div>
                    <div class="text-lg font-bold text-white">${values[i]}</div>
                    <div class="text-[9px] text-slate-600">${metricUnit[currentMetric]}</div>
                </div>`;
            }).join('');
        }

        function setMetric(m, el) {
            currentMetric = m;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-card'));
            el.classList.add('active-card');
            updateDashboard();
        }

        function setRange(r) {
            currentRange = r;
            document.getElementById('btn-hourly').className = r === 'hourly' ? "active-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all shadow-lg" : "text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all";
            document.getElementById('btn-daily').className = r === 'daily' ? "active-btn px-4 py-1.5 rounded-lg text-xs font-bold transition-all shadow-lg" : "text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all";
            updateDashboard();
        }

        init();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CASS | Weather Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;600;700&display=swap');
        body { font-family: 'Chakra+Petch', sans-serif; background-color: #0f172a; color: #cbd5e1; }
        .card-glass { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(10px); }
        .dropdown-content { display: none; position: absolute; background-color: #1e293b; min-width: 200px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); z-index: 100; border-radius: 12px; border: 1px solid #334155; margin-top: 8px; right: 0; }
        .dropdown:hover .dropdown-content { display: block; }
        .stat-card { border-radius: 24px; padding: 1.5rem; transition: all 0.3s ease; border: 2px solid transparent; }
        .stat-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
        .active-btn { background-color: #2563eb !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
        <div class="flex items-center gap-3">
            <div class="p-3 bg-blue-600 rounded-2xl shadow-lg shadow-blue-600/30">
                <i data-lucide="layout-dashboard" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white uppercase">CASS <span class="text-blue-400 font-light">DASHBOARD</span></h1>
        </div>

        <div class="flex flex-wrap gap-3">
            <div class="dropdown relative">
                <button id="dropBtn" class="bg-blue-600 text-white px-5 py-2.5 rounded-full text-sm font-semibold flex items-center gap-2">
                    เลือกสถานที่ <i data-lucide="chevron-down" class="w-4 h-4"></i>
                </button>
                <div id="locationDropdown" class="dropdown-content overflow-hidden">
                    </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="mb-10 border-l-4 border-blue-500 pl-8 text-white uppercase tracking-tighter italic">
            <h2 id="locName" class="text-5xl font-bold mb-2">กำลังโหลด...</h2>
            <div class="flex flex-col gap-1 text-slate-400 text-sm tracking-widest not-italic uppercase">
                <p id="locDetail">อำเภอเมืองสกลนคร · จังหวัดสกลนคร</p>
                <p id="locCoords" class="font-mono text-blue-400/80 tracking-normal">LAT: -- | LON: --</p>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
            <div class="card-glass stat-card border-orange-500/30">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-orange-500/10 rounded-xl text-orange-500"><i data-lucide="thermometer" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Temp</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statTemp" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">°C</span>
                </div>
            </div>
            <div class="card-glass stat-card border-blue-500/30">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-blue-500/10 rounded-xl text-blue-500"><i data-lucide="droplets" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Humid</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statHumid" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">%</span>
                </div>
            </div>
            <div class="card-glass stat-card border-indigo-500/30">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-indigo-500/10 rounded-xl text-indigo-500"><i data-lucide="wind" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Wind</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statWind" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">m/s</span>
                </div>
            </div>
            <div class="card-glass stat-card border-emerald-500/30">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-emerald-500/10 rounded-xl text-emerald-500"><i data-lucide="cloud-rain" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Rain</span>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="statRain" class="text-3xl font-bold text-white">--</span><span class="text-slate-500">mm</span>
                </div>
            </div>
            <div class="card-glass stat-card border-slate-500/20">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-slate-500/10 rounded-xl text-slate-300"><i data-lucide="cloud" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Cloud</span>
                </div>
                <div id="statCloud" class="flex items-baseline gap-1 font-bold text-white">--<span class="text-slate-500 text-sm ml-1">%</span></div>
            </div>
            <div class="card-glass stat-card border-yellow-500/20">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-yellow-500/10 rounded-xl text-yellow-500"><i data-lucide="sun" class="w-5 h-5"></i></div>
                    <span class="text-[9px] font-bold opacity-40 uppercase">Solar</span>
                </div>
                <div id="statSolar" class="flex items-baseline gap-1 font-bold text-white">--<span class="text-slate-500 text-sm ml-1">W/m²</span></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            <div class="lg:col-span-2 card-glass p-8 rounded-[32px]">
                <div class="flex justify-between items-center mb-8">
                    <h3 id="chartTitle" class="font-bold text-lg text-white uppercase tracking-widest">แนวโน้มอุณหภูมิ รายชั่วโมง (°C)</h3>
                    <div class="flex gap-2 bg-slate-800/50 p-1 rounded-xl">
                        <button id="btnHourly" onclick="updateChartMode('hourly')" class="active-btn text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all">รายชั่วโมง</button>
                        <button id="btnDaily" onclick="updateChartMode('daily')" class="text-slate-400 px-4 py-1.5 rounded-lg text-xs font-bold transition-all">7 วัน</button>
                    </div>
                </div>
                <div class="h-[350px] w-full">
                    <canvas id="weatherChart"></canvas>
                </div>
            </div>

            <div class="card-glass p-8 rounded-[32px]">
                <h4 id="sideTitle" class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-10 text-center">รายละเอียดตามช่วงเวลา</h4>
                <div id="sideContainer" class="grid grid-cols-2 gap-4">
                    </div>
                <div class="mt-8 text-center bg-slate-800/30 p-4 rounded-2xl">
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest leading-relaxed">
                        Data provided by <br><span class="text-blue-400 font-bold italic">WRF Simulation Model</span>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 opacity-30 text-[10px] tracking-[0.5em] uppercase">
        Designed and Developed by CASS &copy; 2026
    </footer>

    <script>
        lucide.createIcons();
        let weatherChart;
        let weatherData = [];
        let currentIdx = 0;
        let currentMode = 'hourly';

        // 1. Initialize Chart
        function initChart() {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            weatherChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#3b82f6',
                        borderWidth: 4,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#3b82f6',
                        fill: true,
                        backgroundColor: 'rgba(59, 130, 246, 0.1)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        // 2. Fetch Data
        async function fetchData() {
            try {
                const response = await fetch('weather_data_locations.json?t=' + Date.now());
                weatherData = await response.json();
                renderDropdown();
                updateUI(0);
            } catch (e) {
                console.error("Fetch error", e);
            }
        }

        function renderDropdown() {
            const container = document.getElementById('locationDropdown');
            container.innerHTML = weatherData.map((loc, i) => `
                <a href="#" onclick="updateUI(${i})" class="block px-4 py-3 hover:bg-blue-600 text-sm border-t border-slate-700 first:border-0">${loc.Station_Name}</a>
            `).join('');
        }

        // 3. Update UI
        function updateUI(idx) {
            currentIdx = idx;
            const data = weatherData[idx];
            document.getElementById('dropBtn').innerHTML = `${data.Station_Name} <i data-lucide="chevron-down" class="w-4 h-4"></i>`;
            lucide.createIcons();

            document.getElementById('locName').innerText = data.Station_Name;
            document.getElementById('locCoords').innerText = `LAT: ${data.Lat}°N | LON: ${data.Lon}°E`;
            document.getElementById('statTemp').innerText = data.Temp;
            document.getElementById('statHumid').innerText = data.Humidity;
            document.getElementById('statWind').innerText = data.WindSpeed || 0;
            document.getElementById('statRain').innerText = data.Rain || 0;

            updateChartMode(currentMode);
        }

        // 4. Chart & Side Content Control
        function updateChartMode(mode) {
            currentMode = mode;
            const data = weatherData[currentIdx];
            const sideContainer = document.getElementById('sideContainer');
            
            // Toggle Buttons UI
            document.getElementById('btnHourly').classList.toggle('active-btn', mode === 'hourly');
            document.getElementById('btnDaily').classList.toggle('active-btn', mode === 'daily');

            if (mode === 'hourly') {
                document.getElementById('chartTitle').innerText = "แนวโน้มอุณหภูมิ รายชั่วโมง (°C)";
                document.getElementById('sideTitle').innerText = "รายละเอียดตามช่วงเวลา";
                
                // Mock Hourly (ถ้าใน JSON ไม่มี ให้ใช้ Mock ไปก่อน)
                const labels = ['06:00', '09:00', '12:00', '15:00', '18:00', '21:00'];
                const values = [data.Temp-2, data.Temp, data.Temp+3, data.Temp+2, data.Temp-1, data.Temp-3];
                
                weatherChart.data.labels = labels;
                weatherChart.data.datasets[0].data = values;
                
                // Side Cards
                sideContainer.innerHTML = labels.map((time, i) => `
                    <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-center">
                        <p class="text-[10px] mb-1 opacity-60 text-blue-400 uppercase">${time} น.</p>
                        <p class="text-2xl font-bold text-white">${values[i]}°</p>
                    </div>
                `).join('');

            } else {
                document.getElementById('chartTitle').innerText = "แนวโน้มอุณหภูมิ 7 วัน (°C)";
                document.getElementById('sideTitle').innerText = "พยากรณ์รายวัน";

                const labels = [];
                const values = [];
                const daysTH = ['อา.', 'จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.'];
                const sideHTML = [];

                for(let i=0; i<7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    const label = d.getDate() + ' ' + d.toLocaleDateString('th-TH', {month:'short'});
                    labels.push(label);
                    
                    const t = Math.floor(data.Temp + (Math.random() * 4 - 2));
                    values.push(t);

                    sideHTML.push(`
                        <div class="card-glass p-3 rounded-2xl text-center border border-slate-700/50">
                            <p class="text-[10px] text-slate-500 uppercase mb-1">${i===0?'วันนี้':daysTH[d.getDay()]}</p>
                            <p class="text-xl font-bold text-white">${t}°</p>
                        </div>
                    `);
                }
                
                weatherChart.data.labels = labels;
                weatherChart.data.datasets[0].data = values;
                sideContainer.innerHTML = sideHTML.join('');
            }
            weatherChart.update();
        }

        initChart();
        fetchData();
        setInterval(fetchData, 300000); // อัปเดตทุก 5 นาที
    </script>
</body>
</html>
